services:
  - type: web
    name: calclone-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: calclone-db
          property: connectionString

databases:
  - name: calclone-db
    plan: free
